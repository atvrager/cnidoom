# Curriculum phase 7: E1M1 warmup with short episodes.
# Goal: learn the starting area of E1M1 before full exploration.
# Shorter timeout forces focus on immediate surroundings. ~2M steps.
#
# Same as e1m1_agent.cfg but with 2100 tic timeout (~1 min).

doom_scenario_path = ../../wads/DOOM1.WAD
doom_map = E1M1
doom_skill = 3

screen_resolution = RES_160X120
screen_format = GRAY8

available_game_variables =
    {
        HEALTH
        ARMOR
        AMMO2
        AMMO3
        AMMO4
        AMMO5
        SELECTED_WEAPON
        KILLCOUNT
        POSITION_X
        POSITION_Y
    }

available_buttons =
    {
        MOVE_FORWARD
        MOVE_BACKWARD
        TURN_LEFT
        TURN_RIGHT
        ATTACK
        USE
    }

episode_timeout = 2100
living_reward = 0
death_penalty = 100
