# Curriculum phase 6: sustained combat from multiple angles.
# Goal: survive against waves of approaching enemies.
# Bridges arena combat → E1M1 combat encounters. ~1M steps.
#
# Uses VizDoom's bundled defend_the_line.wad (resolved at runtime).
# Enemies approach from the front; agent must shoot and manage ammo.

doom_scenario_path = defend_the_line.wad
doom_skill = 3

screen_resolution = RES_160X120
screen_format = GRAY8

available_game_variables =
    {
        HEALTH
        ARMOR
        AMMO2
        AMMO3
        AMMO4
        AMMO5
        SELECTED_WEAPON
        KILLCOUNT
        POSITION_X
        POSITION_Y
    }

available_buttons =
    {
        MOVE_FORWARD
        MOVE_BACKWARD
        TURN_LEFT
        TURN_RIGHT
        ATTACK
        USE
    }

episode_start_time = 10
episode_timeout = 2100
living_reward = 0
death_penalty = 100
