# VizDoom scenario config for E1M1 full-level training.
# Use with: DoomHybridEnv(cfg_path="training/scenarios/e1m1_agent.cfg")

doom_scenario_path = ../../wads/DOOM1.WAD
doom_map = E1M1

# Screen — small for fast training; env downsamples further to 60x45.
screen_resolution = RES_160X120
screen_format = GRAY8

# Game variables exposed to the agent (order matters for get_game_variable).
available_game_variables =
    {
        HEALTH
        ARMOR
        AMMO2
        AMMO3
        AMMO4
        AMMO5
        SELECTED_WEAPON
        KILLCOUNT
        POSITION_X
        POSITION_Y
    }

# Actions available to the agent.
available_buttons =
    {
        MOVE_FORWARD
        MOVE_BACKWARD
        TURN_LEFT
        TURN_RIGHT
        ATTACK
        USE
    }

# Episode settings.
episode_timeout = 4200
living_reward = 0
death_penalty = 100
