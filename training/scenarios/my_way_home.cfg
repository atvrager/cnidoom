# Curriculum phase 4: maze navigation.
# Goal: learn to navigate corridors, turn corners, find the goal room.
# No enemies — pure navigation skill. ~500K steps.
#
# Uses VizDoom's bundled my_way_home.wad (resolved at runtime).
# Agent spawns at random location, must reach the green vest room.

doom_scenario_path = my_way_home.wad
doom_skill = 5

screen_resolution = RES_160X120
screen_format = GRAY8

available_game_variables =
    {
        HEALTH
        ARMOR
        AMMO2
        AMMO3
        AMMO4
        AMMO5
        SELECTED_WEAPON
        KILLCOUNT
        POSITION_X
        POSITION_Y
    }

available_buttons =
    {
        MOVE_FORWARD
        MOVE_BACKWARD
        TURN_LEFT
        TURN_RIGHT
        ATTACK
        USE
    }

episode_timeout = 2100
living_reward = -0.0001
death_penalty = 100
