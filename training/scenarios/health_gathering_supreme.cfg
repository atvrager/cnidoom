# Curriculum phase 5: resource-aware navigation under pressure.
# Goal: survive on poison floor by collecting health packs.
# Teaches item awareness + path planning. ~750K steps.
#
# Uses VizDoom's bundled health_gathering_supreme.wad (resolved at runtime).
# Poison floor drains health; health packs spawn randomly.

doom_scenario_path = health_gathering_supreme.wad

screen_resolution = RES_160X120
screen_format = GRAY8

available_game_variables =
    {
        HEALTH
        ARMOR
        AMMO2
        AMMO3
        AMMO4
        AMMO5
        SELECTED_WEAPON
        KILLCOUNT
        POSITION_X
        POSITION_Y
    }

available_buttons =
    {
        MOVE_FORWARD
        MOVE_BACKWARD
        TURN_LEFT
        TURN_RIGHT
        ATTACK
        USE
    }

episode_timeout = 2100
living_reward = 1
death_penalty = 100
